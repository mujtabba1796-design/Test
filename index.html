    <script>
        // ==================== FULL SCHOOL DASHBOARD CODE ====================
        // ----- GLOBALS -----
        const SUBJECTS = ["Quran","Fiqh","Arabic","English","Mathematics","Science"];
        let schoolData = { students: [], teachers: [], feeTransactions: [], attendanceRecords: [], operationalBudgets: [] };
        let currentUser = null;
        let slidesData = [];
        let currentSlideIndex = 0, slideInterval;

        // ----- HELPER: Refresh all data from Supabase -----
        async function refreshSchoolData() {
            const { data: students } = await supabaseClient.from('students').select('*');
            if (students) schoolData.students = students.map(s => ({ ...s, feeStatus: s.fee_status, grades: s.grades || {} }));
            const { data: teachers } = await supabaseClient.from('teachers').select('*');
            if (teachers) schoolData.teachers = teachers;
            const { data: fees } = await supabaseClient.from('fee_transactions').select('*');
            if (fees) schoolData.feeTransactions = fees;
            const { data: attendance } = await supabaseClient.from('attendance_records').select('*');
            if (attendance) schoolData.attendanceRecords = attendance;
            const { data: budget } = await supabaseClient.from('operational_budgets').select('*').limit(1);
            if (budget?.length) schoolData.operationalBudgets = budget;
            // update attendance %
            for (let s of schoolData.students) {
                let recs = schoolData.attendanceRecords.filter(r => r.student_id === s.id);
                let pct = recs.length ? Math.round((recs.filter(r=>r.status==='present').length/recs.length)*100) : 0;
                s.attendance = pct;
                await supabaseClient.from('students').update({ attendance_pct: pct }).eq('id', s.id);
            }
        }

        // ----- STUDENT / TEACHER ACTIONS -----
        async function addStudentLogic(name, section, level, feeStatus, boarding) {
            const { error } = await supabaseClient.from('students').insert([{ name, section, level, fee_status: feeStatus, boarding, grades: {} }]);
            if (error) { alert(error.message); return false; }
            await refreshSchoolData();
            return true;
        }
        async function addTeacher(name, section, subject, salary=100000) {
            await supabaseClient.from('teachers').insert([{ name, section, subject, salary }]);
            await refreshSchoolData();
        }
        async function updateStudentGrades(studentId, grades) {
            await supabaseClient.from('students').update({ grades }).eq('id', studentId);
            await refreshSchoolData();
        }
        async function payFeeAction(studentId) {
            let student = schoolData.students.find(s=>s.id===studentId);
            if (!student || student.feeStatus==='Paid') return;
            await supabaseClient.from('students').update({ fee_status: 'Paid' }).eq('id', studentId);
            await supabaseClient.from('fee_transactions').insert([{ student_id: studentId, student_name: student.name, amount: 25000, date: new Date().toISOString().slice(0,10) }]);
            await refreshSchoolData();
            refreshCurrentView();
        }
        async function saveAttendance(attendanceList) {
            const today = new Date().toISOString().slice(0,10);
            for (let a of attendanceList) {
                await supabaseClient.from('attendance_records').upsert({ student_id: a.studentId, date: today, status: a.status }, { onConflict: 'student_id,date' });
            }
            await refreshSchoolData();
        }

        // ----- SLIDESHOW MANAGEMENT (localStorage) -----
        function loadSlides() {
            let stored = localStorage.getItem('academy_slides');
            slidesData = stored ? JSON.parse(stored) : [
                { url: "https://picsum.photos/id/20/1200/600", caption: "Modern Classrooms" },
                { url: "https://picsum.photos/id/30/1200/600", caption: "Qur'an Memorization" },
                { url: "https://picsum.photos/id/40/1200/600", caption: "Science Lab" }
            ];
        }
        function saveSlides() { localStorage.setItem('academy_slides', JSON.stringify(slidesData)); }
        function rebuildSlideshow() {
            let container = document.getElementById('slidesContainer');
            let dots = document.getElementById('dotsContainer');
            if (!container) return;
            container.innerHTML = ''; dots.innerHTML = '';
            slidesData.forEach((slide, idx) => {
                let div = document.createElement('div');
                div.className = `carousel-slide absolute inset-0 w-full h-full transition-opacity duration-500 ${idx===currentSlideIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`;
                div.style.backgroundImage = `linear-gradient(0deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2)), url('${slide.url}')`;
                div.style.backgroundSize = 'cover';
                div.style.backgroundPosition = 'center';
                let cap = document.createElement('div');
                cap.className = 'absolute bottom-0 left-0 right-0 bg-black/60 text-white p-4 text-center';
                cap.innerText = slide.caption;
                div.appendChild(cap);
                container.appendChild(div);
                let dot = document.createElement('button');
                dot.className = `dot w-3 h-3 rounded-full mx-1 ${idx===currentSlideIndex ? 'bg-amber-400 w-4' : 'bg-white/60'}`;
                dot.onclick = () => goToSlide(idx);
                dots.appendChild(dot);
            });
        }
        function goToSlide(idx) {
            let slides = document.querySelectorAll('#slidesContainer .carousel-slide');
            let dots = document.querySelectorAll('#dotsContainer .dot');
            if (!slides.length) return;
            if (idx < 0) idx = slides.length-1;
            if (idx >= slides.length) idx = 0;
            slides[currentSlideIndex]?.classList.remove('opacity-100','z-10');
            slides[currentSlideIndex]?.classList.add('opacity-0','z-0');
            slides[idx]?.classList.remove('opacity-0','z-0');
            slides[idx]?.classList.add('opacity-100','z-10');
            if (dots[currentSlideIndex]) dots[currentSlideIndex].classList.replace('bg-amber-400','bg-white/60');
            if (dots[idx]) dots[idx].classList.replace('bg-white/60','bg-amber-400');
            currentSlideIndex = idx;
            resetAutoSlide();
        }
        function nextSlide() { goToSlide(currentSlideIndex+1); }
        function prevSlide() { goToSlide(currentSlideIndex-1); }
        function resetAutoSlide() { if (slideInterval) clearInterval(slideInterval); if(slidesData.length>1) slideInterval = setInterval(nextSlide,5000); }
        async function addSlideFromFile(file, caption) {
            return new Promise(resolve => {
                let reader = new FileReader();
                reader.onload = e => {
                    slidesData.push({ url: e.target.result, caption: caption || "Uploaded" });
                    saveSlides();
                    rebuildSlideshow();
                    resetAutoSlide();
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }
        function deleteSlide(index) {
            slidesData.splice(index,1);
            saveSlides();
            rebuildSlideshow();
            if (currentSlideIndex >= slidesData.length) currentSlideIndex = slidesData.length-1;
            if (currentSlideIndex<0) currentSlideIndex=0;
            goToSlide(currentSlideIndex);
        }

        // ----- DASHBOARD VIEWS (role-based) -----
        function refreshCurrentView() {
            let active = document.querySelector('.nav-link.active');
            if (active) renderContentView(active.dataset.view);
            else renderDashboard();
        }
        function renderContentView(view) {
            const views = {
                dashboard: renderDashboard, students: renderAllStudents, "enroll-student": renderEnrollStudent,
                teachers: renderTeachers, "enroll-staff": renderEnrollStaff, fees: renderFeeManagement,
                "payment-report": renderPaymentReport, boarding: renderBoarding, "teachers-payroll": renderPayroll,
                "budget-report": renderBudgetReport, "budget-management": renderBudgetManagement,
                "academic-performance": renderAcademicPerformance, "section-analysis": renderSectionAnalysis,
                "research-notes": renderResearchNotes, "grade-students": renderGradeStudents,
                "my-class": renderMyClass, attendance: renderAttendance, "section-students": renderHeadSection,
                "section-fees": renderHeadFees, "my-children": renderMyChildren, "payment-history": renderParentPayments,
                "grade-students-teacher": renderTeacherGrade, "manage-slides": renderSlideManager
            };
            (views[view] || renderDashboard)();
        }
        function renderDashboard() {
            let total = schoolData.students.length, teachers = schoolData.teachers.length;
            let pending = schoolData.students.filter(s=>s.feeStatus==='Pending').length;
            let avgAtt = schoolData.students.length ? Math.round(schoolData.students.reduce((a,b)=>a+b.attendance,0)/schoolData.students.length) : 0;
            document.getElementById('mainContent').innerHTML = `
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold">Welcome, ${currentUser.full_name}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                        <div class="bg-white p-5 rounded-2xl shadow border-l-8 border-emerald-500"><i class="fas fa-users text-3xl text-emerald-500"></i><p class="text-2xl font-bold">${total}</p><p>Students</p></div>
                        <div class="bg-white p-5 rounded-2xl shadow border-l-8 border-amber-500"><i class="fas fa-chalkboard-user text-3xl text-amber-500"></i><p class="text-2xl font-bold">${teachers}</p><p>Staff</p></div>
                        <div class="bg-white p-5 rounded-2xl shadow border-l-8 border-red-500"><i class="fas fa-dollar-sign text-3xl text-red-500"></i><p class="text-2xl font-bold">${pending}</p><p>Pending Fees</p></div>
                        <div class="bg-white p-5 rounded-2xl shadow border-l-8 border-blue-500"><i class="fas fa-calendar-check text-3xl text-blue-500"></i><p class="text-2xl font-bold">${avgAtt}%</p><p>Avg Attendance</p></div>
                    </div>
                </div>`;
        }
        function renderAllStudents() {
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">All Students</h2><table class="w-full text-sm"><thead class="bg-gray-100"><tr><th>Name</th><th>Section</th><th>Level</th><th>Fee</th><th>Avg Grade</th></tr></thead><tbody>`;
            schoolData.students.forEach(s => {
                let avg = Math.round(SUBJECTS.reduce((a,sub)=>a+(s.grades?.[sub]||0),0)/SUBJECTS.length);
                html += `<tr><td class="p-2">${s.name}</td><td>${s.section}</td><td>${s.level}</td><td class="${s.feeStatus==='Paid'?'text-green-600':'text-red-500'}">${s.feeStatus}</td><td>${avg}%</td></tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderEnrollStudent() {
            let sections = ["Regular Islamiya","Regular Memorization","Intensive Program","Islamic Integration","Advanced Class","Women Class"];
            let html = `<div class="bg-white p-6 rounded-xl max-w-2xl mx-auto"><h2 class="text-2xl font-bold mb-4">Enroll Student</h2><form id="enrollForm"><div class="mb-3"><label>Name</label><input id="stName" class="w-full border p-2 rounded"></div><div class="mb-3"><label>Section</label><select id="stSection" class="w-full border p-2 rounded">${sections.map(s=>`<option>${s}</option>`).join('')}</select></div><div class="mb-3"><label>Level</label><input id="stLevel" type="number" class="w-full border p-2 rounded"></div><div class="mb-3"><label>Fee Status</label><select id="stFee" class="w-full border p-2 rounded"><option>Pending</option><option>Paid</option></select></div><div class="mb-3"><label>Boarding</label><select id="stBoard" class="w-full border p-2 rounded"><option value="false">Day</option><option value="true">Boarder</option></select></div><button type="submit" class="bg-emerald-600 text-white px-6 py-2 rounded-lg">Register</button></form></div>`;
            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('enrollForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                let name = document.getElementById('stName').value;
                let section = document.getElementById('stSection').value;
                let level = parseInt(document.getElementById('stLevel').value);
                let fee = document.getElementById('stFee').value;
                let board = document.getElementById('stBoard').value === 'true';
                if (await addStudentLogic(name, section, level, fee, board)) renderAllStudents();
            });
        }
        function renderTeachers() {
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Teachers</h2><table class="w-full"><thead><tr><th>Name</th><th>Section</th><th>Subject</th></tr></thead><tbody>${schoolData.teachers.map(t=>`<tr><td class="p-2">${t.name}</td><td>${t.section}</td><td>${t.subject}</td></tr>`).join('')}</tbody></table></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderEnrollStaff() {
            let html = `<div class="bg-white p-6 rounded-xl max-w-2xl mx-auto"><h2 class="text-2xl font-bold mb-4">Add Staff</h2><form id="staffForm"><input id="staffName" placeholder="Name" class="w-full border p-2 mb-3 rounded"><input id="staffSection" placeholder="Section" class="w-full border p-2 mb-3 rounded"><input id="staffSubject" placeholder="Subject" class="w-full border p-2 mb-3 rounded"><button type="submit" class="bg-teal-600 text-white px-6 py-2 rounded">Add</button></form></div>`;
            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('staffForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await addTeacher(document.getElementById('staffName').value, document.getElementById('staffSection').value, document.getElementById('staffSubject').value);
                renderTeachers();
            });
        }
        function renderFeeManagement() {
            let pending = schoolData.students.filter(s=>s.feeStatus==='Pending');
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Pending Fees (${pending.length})</h2><ul>${pending.map(s=>`<li class="flex justify-between py-1">${s.name} <button onclick="window.payFeeAction('${s.id}')" class="bg-amber-500 text-white px-3 py-1 rounded text-sm">Mark Paid</button></li>`).join('')}</ul></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderPaymentReport() {
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Fee Transactions</h2><ul>${schoolData.feeTransactions.map(t=>`<li>${t.student_name} - ₦${t.amount} on ${t.date}</li>`).join('')}</ul></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderBoarding() {
            let boarders = schoolData.students.filter(s=>s.boarding);
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Boarding Students (${boarders.length})</h2><ul>${boarders.map(b=>`<li>${b.name}</li>`).join('')}</ul></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderPayroll() {
            let total = schoolData.teachers.reduce((s,t)=>s+(t.salary||100000),0);
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Payroll</h2><table class="w-full"><thead><tr><th>Name</th><th>Salary</th></tr></thead><tbody>${schoolData.teachers.map(t=>`<tr><td>${t.name}</td><td>₦${(t.salary||100000).toLocaleString()}</td></tr>`).join('')}</tbody></table><div class="mt-3 font-bold">Total: ₦${total.toLocaleString()}</div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderBudgetReport() {
            let b = schoolData.operationalBudgets[0] || { year:2025, allocation:7500000, spent:3200000 };
            let percent = (b.spent/b.allocation)*100;
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Budget ${b.year}</h2><p>Allocation: ₦${b.allocation.toLocaleString()}</p><p>Spent: ₦${b.spent.toLocaleString()}</p><p>Remaining: ₦${(b.allocation-b.spent).toLocaleString()}</p><div class="w-full bg-gray-200 rounded-full h-2.5 mt-2"><div class="bg-emerald-600 h-2.5 rounded-full" style="width:${percent}%"></div></div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderBudgetManagement() {
            let b = schoolData.operationalBudgets[0] || { year:2025, allocation:7500000, spent:3200000 };
            let html = `<div class="bg-white p-6 rounded-xl max-w-2xl mx-auto"><h2 class="text-2xl font-bold mb-4">Edit Budget</h2><form id="budgetForm"><div class="mb-3"><label>Year</label><input id="budgetYear" value="${b.year}" class="w-full border p-2 rounded"></div><div class="mb-3"><label>Allocation (₦)</label><input id="budgetAlloc" value="${b.allocation}" class="w-full border p-2 rounded"></div><div class="mb-3"><label>Spent (₦)</label><input id="budgetSpent" value="${b.spent}" class="w-full border p-2 rounded"></div><button type="submit" class="bg-emerald-600 text-white px-6 py-2 rounded">Update</button></form></div>`;
            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('budgetForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                let year = parseInt(document.getElementById('budgetYear').value);
                let alloc = parseInt(document.getElementById('budgetAlloc').value);
                let spent = parseInt(document.getElementById('budgetSpent').value);
                await supabaseClient.from('operational_budgets').upsert({ year, allocation: alloc, spent });
                await refreshSchoolData();
                renderBudgetManagement();
            });
        }
        function renderAcademicPerformance() {
            let total = schoolData.students.reduce((sum,s)=> sum + SUBJECTS.reduce((a,sub)=>a+(s.grades?.[sub]||0),0)/SUBJECTS.length, 0);
            let avg = (total/schoolData.students.length).toFixed(1);
            document.getElementById('mainContent').innerHTML = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Overall Average</h2><p class="text-3xl font-bold">${avg}%</p></div>`;
        }
        function renderSectionAnalysis() {
            let sections = {};
            schoolData.students.forEach(s => {
                let avg = SUBJECTS.reduce((a,sub)=>a+(s.grades?.[sub]||0),0)/SUBJECTS.length;
                if (!sections[s.section]) sections[s.section] = { sum:0, count:0 };
                sections[s.section].sum += avg;
                sections[s.section].count++;
            });
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Section Performance</h2><ul>${Object.entries(sections).map(([sec,data])=>`<li>${sec}: ${(data.sum/data.count).toFixed(1)}%</li>`).join('')}</ul></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderResearchNotes() {
            document.getElementById('mainContent').innerHTML = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Research & Development</h2><p>STEM-Islamic integration project, AI literacy program.</p></div>`;
        }
        function renderGradeStudents() {
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Grade Students (All Subjects)</h2>${schoolData.students.map(s=>`<div class="border-b pb-3 mb-3"><b>${s.name}</b><div class="flex flex-wrap gap-2 mt-2">${SUBJECTS.map(sub=>`<label class="text-sm">${sub}:<input type="number" id="g_${s.id}_${sub}" value="${s.grades?.[sub]||70}" class="grade-input ml-1"></label>`).join('')}</div><button onclick="updateGrades('${s.id}')" class="bg-blue-500 text-white px-3 py-1 rounded text-sm mt-2">Save</button></div>`).join('')}</div>`;
            document.getElementById('mainContent').innerHTML = html;
            window.updateGrades = async (sid) => {
                let newGrades = {};
                SUBJECTS.forEach(sub => { newGrades[sub] = parseInt(document.getElementById(`g_${sid}_${sub}`).value) || 0; });
                await updateStudentGrades(sid, newGrades);
                renderGradeStudents();
            };
        }
        function renderMyClass() {
            let students = schoolData.students.filter(s=>s.section === currentUser.assignedSection);
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">My Class (${currentUser.assignedSection})</h2><div class="grid grid-cols-2 gap-3">${students.map(s=>`<div class="border p-3 rounded"><b>${s.name}</b><br>Avg: ${Math.round(SUBJECTS.reduce((a,sub)=>a+(s.grades?.[sub]||0),0)/SUBJECTS.length)}%<br>Attendance: ${s.attendance}%</div>`).join('')}</div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderAttendance() {
            let students = schoolData.students.filter(s=>s.section === currentUser.assignedSection);
            let today = new Date().toISOString().slice(0,10);
            let existing = schoolData.attendanceRecords.filter(r=>r.date===today);
            let statusMap = {};
            existing.forEach(r=>statusMap[r.student_id]=r.status==='present');
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Mark Attendance (${today})</h2><table class="w-full"><thead><tr><th>Student</th><th>Present</th></tr></thead><tbody>${students.map(s=>`<tr><td>${s.name}</td><td class="text-center"><input type="checkbox" class="att-check" data-id="${s.id}" ${statusMap[s.id]?'checked':''}></td></tr>`).join('')}</tbody></table><button id="saveAttBtn" class="mt-4 bg-emerald-600 text-white px-4 py-2 rounded">Save</button></div>`;
            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('saveAttBtn').addEventListener('click', async () => {
                let checks = document.querySelectorAll('.att-check');
                let data = [];
                checks.forEach(cb => data.push({ studentId: cb.dataset.id, status: cb.checked ? 'present' : 'absent' }));
                await saveAttendance(data);
                alert("Attendance saved");
                renderAttendance();
            });
        }
        function renderHeadSection() {
            let students = schoolData.students.filter(s=>s.section === currentUser.section);
            document.getElementById('mainContent').innerHTML = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">${currentUser.section} Students</h2><ul>${students.map(s=>`<li>${s.name}</li>`).join('')}</ul></div>`;
        }
        function renderHeadFees() {
            let pending = schoolData.students.filter(s=>s.section===currentUser.section && s.feeStatus==='Pending');
            document.getElementById('mainContent').innerHTML = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Pending Fees in ${currentUser.section}</h2><ul>${pending.map(s=>`<li>${s.name}</li>`).join('')}</ul></div>`;
        }
        function renderMyChildren() {
            let children = schoolData.students.filter(s=>currentUser.linkedChildren?.includes(s.id));
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">My Children</h2>${children.map(c=>`<div class="border p-3 mb-2"><b>${c.name}</b><br>Avg Grade: ${Math.round(SUBJECTS.reduce((a,sub)=>a+(c.grades?.[sub]||0),0)/SUBJECTS.length)}%<br>Attendance: ${c.attendance}%<br>Fee: ${c.feeStatus}</div>`).join('')}</div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        function renderParentPayments() {
            let payments = schoolData.feeTransactions.filter(t=>currentUser.linkedChildren?.includes(t.student_id));
            document.getElementById('mainContent').innerHTML = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Payment History</h2><ul>${payments.map(p=>`<li>${p.student_name} - ₦${p.amount} on ${p.date}</li>`).join('')}</ul></div>`;
        }
        function renderTeacherGrade() {
            let students = schoolData.students.filter(s=>s.section === currentUser.assignedSection);
            let html = `<div class="bg-white p-5 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">Grade My Class</h2>${students.map(s=>`<div class="border-b pb-3 mb-3"><b>${s.name}</b><div class="flex flex-wrap gap-2 mt-2">${SUBJECTS.map(sub=>`<label class="text-sm">${sub}:<input type="number" id="g_${s.id}_${sub}" value="${s.grades?.[sub]||70}" class="grade-input ml-1"></label>`).join('')}</div><button onclick="updateTeacherGrade('${s.id}')" class="bg-blue-500 text-white px-3 py-1 rounded text-sm mt-2">Save</button></div>`).join('')}</div>`;
            document.getElementById('mainContent').innerHTML = html;
            window.updateTeacherGrade = async (sid) => {
                let newGrades = {};
                SUBJECTS.forEach(sub => { newGrades[sub] = parseInt(document.getElementById(`g_${sid}_${sub}`).value) || 0; });
                await updateStudentGrades(sid, newGrades);
                renderTeacherGrade();
            };
        }
        function renderSlideManager() {
            let html = `<div class="bg-white p-6 rounded-xl max-w-4xl mx-auto"><h2 class="text-2xl font-bold mb-4">Manage Slideshow</h2><div class="border-2 border-dashed p-4 mb-6"><input type="file" id="slideImage" accept="image/*"><input type="text" id="slideCaption" placeholder="Caption" class="w-full border p-2 mt-2"><button id="uploadSlideBtn" class="mt-2 bg-emerald-600 text-white px-4 py-2 rounded">Upload</button></div><div class="grid grid-cols-3 gap-3">${slidesData.map((s,i)=>`<div><img src="${s.url}" class="h-24 w-full object-cover rounded"><p class="text-sm">${s.caption}</p><button onclick="deleteSlide(${i})" class="bg-red-500 text-white text-xs px-2 py-1 mt-1 rounded">Delete</button></div>`).join('')}</div></div>`;
            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('uploadSlideBtn').addEventListener('click', async () => {
                let file = document.getElementById('slideImage').files[0];
                let cap = document.getElementById('slideCaption').value;
                if (file) { await addSlideFromFile(file, cap); renderSlideManager(); }
            });
            window.deleteSlide = (idx) => { deleteSlide(idx); renderSlideManager(); };
        }

        // ----- AUTHENTICATION -----
        async function ensureProfileExists(user) {
            let { data: existing } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            if (!existing) {
                let metadata = user.user_metadata || {};
                await supabaseClient.from('profiles').insert([{ id: user.id, email: user.email, full_name: metadata.full_name || user.email.split('@')[0], role: metadata.role || 'parent' }]);
            }
        }
        async function registerUser(email, password, fullName, role) {
            let { error } = await supabaseClient.auth.signUp({ email, password, options: { data: { full_name: fullName, role } } });
            if (error) alert(error.message);
            else alert("Registration successful! Please check your email to confirm.");
        }
        async function loginUser(email, password) {
            let { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) { alert("Login failed: "+error.message); return; }
            await ensureProfileExists(data.user);
            let { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', data.user.id).single();
            if (!profile) { alert("Profile missing"); return; }
            currentUser = { ...profile, full_name: profile.full_name,
                assignedSection: profile.role === 'teacher' ? "Regular Islamiya" : null,
                section: profile.role === 'headteacher' ? "Regular Islamiya" : null,
                linkedChildren: profile.role === 'parent' ? ["STU1001","STU1002"] : null
            };
            showDashboard();
        }
        async function logoutUser() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            document.getElementById('appContainer').classList.add('hidden');
            document.getElementById('landingPage').style.display = 'block';
            document.getElementById('loginScreen').style.display = 'none';
        }
        async function resetPasswordAction() {
            let email = document.getElementById('authEmail').value;
            if (!email) { alert("Enter email"); return; }
            let { error } = await supabaseClient.auth.resetPasswordForEmail(email);
            if (error) alert(error.message);
            else alert("Reset link sent to email.");
        }
        async function checkSession() {
            let { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                await ensureProfileExists(session.user);
                let { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                if (profile) {
                    currentUser = { ...profile, full_name: profile.full_name,
                        assignedSection: profile.role === 'teacher' ? "Regular Islamiya" : null,
                        section: profile.role === 'headteacher' ? "Regular Islamiya" : null,
                        linkedChildren: profile.role === 'parent' ? ["STU1001","STU1002"] : null
                    };
                    showDashboard();
                }
            }
        }
        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('landingPage').style.display = 'none';
            document.getElementById('appContainer').classList.remove('hidden');
            document.getElementById('userRoleDisplay').innerText = currentUser.role.toUpperCase();
            document.getElementById('userNameDisplay').innerText = currentUser.full_name;
            renderNav();
            refreshSchoolData();
        }
        function getNavItems() {
            let role = currentUser.role;
            if (role === "dg_ceo" || role === "umc") return ["dashboard","students","enroll-student","teachers","enroll-staff","fees","boarding","payment-report","teachers-payroll","budget-report","budget-management","manage-slides"];
            if (role === "daf") return ["dashboard","fees","payment-report","teachers-payroll","boarding","budget-report"];
            if (role === "drpa") return ["dashboard","students","academic-performance","section-analysis","research-notes","grade-students"];
            if (role === "do") return ["dashboard","fees","boarding","teachers"];
            if (role === "der") return ["dashboard","students","teachers","section-analysis"];
            if (role === "headteacher") return ["dashboard","section-students","section-fees","enroll-student"];
            if (role === "teacher") return ["dashboard","my-class","grade-students-teacher","attendance"];
            if (role === "parent") return ["my-children","payment-history"];
            return ["dashboard"];
        }
        function renderNav() {
            let labels = { dashboard:"Dashboard", students:"Students","enroll-student":"Enroll", teachers:"Staff","enroll-staff":"Add Staff", fees:"Fees", boarding:"Boarding","payment-report":"Payments","teachers-payroll":"Payroll","budget-report":"Budget","budget-management":"Edit Budget","academic-performance":"Performance","section-analysis":"Section Analysis","research-notes":"Research","grade-students":"Grade All","my-class":"My Class", attendance:"Attendance","section-students":"Section Students","section-fees":"Section Fees","my-children":"My Children","payment-history":"Payments","grade-students-teacher":"Grade Class","manage-slides":"Slideshow" };
            let items = getNavItems();
            let html = items.map(v=>`<a href="#" data-view="${v}" class="nav-link flex items-center space-x-3 px-4 py-2.5 rounded-lg text-slate-200 hover:bg-white/10"><i class="fas ${v==='dashboard'?'fa-tachometer-alt':v==='manage-slides'?'fa-images':'fa-folder'} w-5"></i><span>${labels[v]||v}</span></a>`).join('');
            document.getElementById('dynamicNav').innerHTML = html;
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
                    link.classList.add('active');
                    renderContentView(link.dataset.view);
                });
            });
            if (items.length) renderContentView(items[0]);
        }

        // ----- INIT & EVENT LISTENERS -----
        window.payFeeAction = payFeeAction;
        window.resetPasswordAction = resetPasswordAction;
        window.deleteSlide = deleteSlide;
        window.updateGrades = (sid) => {};
        window.updateTeacherGrade = (sid) => {};

        async function init() {
            loadSlides();
            rebuildSlideshow();
            resetAutoSlide();
            await checkSession();
            if (!currentUser) {
                document.getElementById('landingPage').style.display = 'block';
                document.getElementById('appContainer').classList.add('hidden');
            }
            setInterval(() => {
                let now = new Date();
                if (document.getElementById('liveTime')) document.getElementById('liveTime').innerText = now.toLocaleTimeString();
                if (document.getElementById('liveDate')) document.getElementById('liveDate').innerText = now.toLocaleDateString();
            }, 1000);
        }
        document.getElementById('loginBtnHero')?.addEventListener('click',()=>{ document.getElementById('landingPage').style.display='none'; document.getElementById('loginScreen').style.display='flex'; });
        document.getElementById('loginBtnFooter')?.addEventListener('click',()=>{ document.getElementById('landingPage').style.display='none'; document.getElementById('loginScreen').style.display='flex'; });
        document.getElementById('closeLoginBtn')?.addEventListener('click',()=>{ document.getElementById('loginScreen').style.display='none'; document.getElementById('landingPage').style.display='block'; });
        document.getElementById('logoutBtn')?.addEventListener('click',logoutUser);
        document.getElementById('toggleAuthMode')?.addEventListener('click',()=>{
            let isLogin = document.getElementById('authTitle').innerText.includes('Login');
            document.getElementById('authTitle').innerText = isLogin ? 'Create Account' : 'Staff / Admin Login';
            document.getElementById('authSubmitBtn').innerText = isLogin ? 'Register' : 'Login';
            document.getElementById('regFields').classList.toggle('hidden', !isLogin);
            document.getElementById('toggleText').innerText = isLogin ? "Already have an account?" : "Don't have an account?";
            document.getElementById('toggleAuthMode').innerText = isLogin ? "Login" : "Sign Up";
        });
        document.getElementById('authForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            let email = document.getElementById('authEmail').value;
            let pwd = document.getElementById('authPassword').value;
            let isLogin = document.getElementById('authTitle').innerText.includes('Login');
            if (isLogin) await loginUser(email, pwd);
            else {
                let name = document.getElementById('regFullName').value;
                let role = document.getElementById('authRole').value;
                if (name) await registerUser(email, pwd, name, role);
                else alert("Full name required");
            }
        });
        document.getElementById('prevSlide')?.addEventListener('click', prevSlide);
        document.getElementById('nextSlide')?.addEventListener('click', nextSlide);
        init();
    </script>
    
</body>
</html>
